replicaCount: 1

image:
  repository: eclipse-mosquitto
  tag: "2.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  mqttPort: 1883     # internal only; robots connect via WireGuard
  websocketPort: 9001

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Mosquitto configuration
config: |
  listener 1883
  protocol mqtt
  allow_anonymous false
  password_file /etc/mosquitto/passwd

  listener 9001
  protocol websockets

  persistence true
  persistence_location /mosquitto/data/

  log_dest stdout
  log_type all

  # Client rate limiting
  max_connections 500
  max_inflight_messages 40
  max_queued_messages 1000

  # TLS (optional, since we're behind WireGuard)
  # cafile /etc/mosquitto/certs/ca.crt
  # certfile /etc/mosquitto/certs/server.crt
  # keyfile /etc/mosquitto/certs/server.key

# Credentials stored as K8s Secret (generated by generate-secrets.sh)
passwordSecret: mosquitto-passwords

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 5Gi

# Topics ACL
acl: |
  # Robot publishers
  pattern write robots/%c/status
  pattern write robots/%c/telemetry
  pattern write robots/%c/alert
  # Controller subscribers
  user amr-controller
  topic robots/+/status
  topic robots/+/telemetry
  topic robots/+/alert
  topic write robots/+/task
  # InfluxDB subscriber
  user influxdb-subscriber
  topic robots/+/telemetry

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1883
  fsGroup: 1883

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: [ALL]
