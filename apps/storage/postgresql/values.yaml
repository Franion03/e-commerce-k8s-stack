# CloudNativePG Cluster (replaces Patroni, fully operator-managed)
cloudnative-pg:
  # The operator is installed cluster-wide; this chart deploys a Cluster CR
  crds:
    create: true

cluster:
  name: pg-primary
  namespace: storage

  instances: 3   # 1 primary + 2 replicas

  imageName: ghcr.io/cloudnative-pg/postgresql:16.3

  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi

  storage:
    storageClass: longhorn
    size: 100Gi

  walStorage:
    storageClass: longhorn
    size: 10Gi

  # Databases provisioned automatically
  bootstrap:
    initdb:
      database: saleor
      owner: saleor
      secret:
        name: pg-saleor-user-secret

  # Additional databases via post-init SQL
  postInitSQL:
    - "CREATE DATABASE odoo OWNER odoo;"
    - "CREATE DATABASE keycloak OWNER keycloak;"
    - "CREATE DATABASE gitlab OWNER gitlab;"
    - "CREATE DATABASE n8n OWNER n8n;"
    - "CREATE DATABASE strapi OWNER strapi;"
    - "CREATE DATABASE plausible OWNER plausible;"

  # Backup to MinIO
  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://pg-backups"
      endpointURL: "http://minio.storage.svc.cluster.local:9000"
      s3Credentials:
        accessKeyId:
          name: pg-minio-secret
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-minio-secret
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 4

  # Scheduled full backup (daily at 02:00)
  scheduledBackup:
    name: pg-daily-backup
    schedule: "0 2 * * *"
    backupOwnerReference: self

  monitoring:
    enabled: true
    customQueriesConfigMap:
      - name: cnpg-default-monitoring
        key: queries

  # PgBouncer connection pooler
  pooler:
    enabled: true
    instances: 2
    type: RW
    pgbouncer:
      poolMode: transaction
      maxClientConn: 1000
      defaultPoolSize: 25

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
