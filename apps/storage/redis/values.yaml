redis:
  architecture: replication

  auth:
    enabled: true
    existingSecret: redis-secret
    existingSecretPasswordKey: password

  master:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    persistence:
      enabled: true
      storageClass: longhorn
      size: 10Gi

  replica:
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    persistence:
      enabled: true
      storageClass: longhorn
      size: 10Gi

  sentinel:
    enabled: true   # Sentinel for HA failover

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
