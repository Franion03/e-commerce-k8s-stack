{{- if and .Values.cloudflared.enabled .Values.cloudflared.externalSecrets.enabled }}
# ── ExternalSecret — cloudflared tunnel credentials ──────────────
# Pulls the tunnel credentials JSON from Vault and writes it as a
# Kubernetes Secret consumed by the cloudflared Deployment.
#
# Required Vault path: {{ .Values.cloudflared.externalSecrets.vaultPath }}
#   credentials-json  — JSON produced by `cloudflared tunnel create`
#                       Store the entire JSON as a single flat string.
#   tunnel-id         — UUID of the tunnel (informational / override)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-credentials
  namespace: infrastructure
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/managed-by: Helm
spec:
  refreshInterval: {{ .Values.cloudflared.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.cloudflared.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.cloudflared.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: cloudflared-credentials
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # credentials.json — mounted at /etc/cloudflared/credentials.json
    - secretKey: credentials.json
      remoteRef:
        key: {{ .Values.cloudflared.externalSecrets.vaultPath | quote }}
        property: credentials-json
    # tunnel-id — informational, used by readiness checks / scripts
    - secretKey: tunnel-id
      remoteRef:
        key: {{ .Values.cloudflared.externalSecrets.vaultPath | quote }}
        property: tunnel-id
{{- end }}
