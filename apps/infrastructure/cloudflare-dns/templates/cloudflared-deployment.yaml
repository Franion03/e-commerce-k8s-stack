{{- if .Values.cloudflared.enabled }}
# ── ServiceAccount ───────────────────────────────────────────────
# cloudflared does not call the Kubernetes API; it only needs the
# default token mount so it can read the cluster CA bundle to verify
# the argocd-server and k8s-api TLS certificates.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudflared
  namespace: infrastructure
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/managed-by: Helm
automountServiceAccountToken: true   # CA bundle needed for originRequest.caPool

---
# ── Deployment ───────────────────────────────────────────────────
# Two replicas — Cloudflare load-balances incoming traffic across all
# active connectors belonging to the same tunnel automatically.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: infrastructure
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ .Values.cloudflared.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  # Rolling update keeps at least one connector alive during upgrades
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/component: tunnel
      annotations:
        # Force pod restart when the config ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/cloudflared-configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.cloudflared.metrics.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cloudflared

      # Spread replicas across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: cloudflared

      securityContext:
        runAsNonRoot: true
        runAsUser: 65532   # nonroot user in distroless image
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: cloudflared
          image: "{{ .Values.cloudflared.image.repository }}:{{ .Values.cloudflared.image.tag }}"
          imagePullPolicy: {{ .Values.cloudflared.image.pullPolicy }}

          # Use the config file; the tunnel UUID is read from credentials.json
          command:
            - cloudflared
            - tunnel
            - --config
            - /etc/cloudflared/config.yaml
            - --loglevel
            - info
            - --logformat
            - json
            - run

          ports:
            - name: metrics
              containerPort: {{ .Values.cloudflared.metrics.port }}
              protocol: TCP

          # cloudflared exposes /readyz and /healthz on the metrics port
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          resources:
            {{- toYaml .Values.cloudflared.resources | nindent 12 }}

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            # Tunnel config.yaml
            - name: config
              mountPath: /etc/cloudflared/config.yaml
              subPath: config.yaml
              readOnly: true
            # Tunnel credentials JSON (from ExternalSecret / Vault)
            - name: credentials
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
              readOnly: true
            # Writable tmpfs for cloudflared's runtime files
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: credentials
          secret:
            secretName: cloudflared-credentials
            defaultMode: 0400   # owner-read only
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi

      # Give ESO time to populate the credentials secret before pods start
      initContainers:
        - name: wait-for-credentials
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until [ -f /etc/cloudflared/credentials.json ]; do
                echo "Waiting for credentials secret…"
                sleep 2
              done
              echo "Credentials found."
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: credentials
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
              readOnly: true
{{- end }}
