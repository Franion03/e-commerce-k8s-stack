kube-prometheus-stack:
  # ── Prometheus ────────────────────────────────
  prometheus:
    enabled: true
    prometheusSpec:
      replicas: 1
      retention: 30d
      retentionSize: "45GB"
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "4"
          memory: 8Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      # Scrape all pods in all namespaces
      podMonitorNamespaceSelector: {}
      serviceMonitorNamespaceSelector: {}
      ruleNamespaceSelector: {}
      # External labels for federation / Grafana Cloud
      externalLabels:
        cluster: "kiruz-prod"
        environment: "production"

  # ── Alertmanager ──────────────────────────────
  alertmanager:
    enabled: true
    alertmanagerSpec:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    config:
      global:
        resolve_timeout: 5m
        smtp_from: "alerts@kiruz.com"
        smtp_smarthost: "mailcow.marketing.svc.cluster.local:587"
      route:
        group_by: ["alertname", "cluster", "service"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: "slack-critical"
        routes:
          - match:
              severity: critical
            receiver: "slack-critical"
          - match:
              severity: warning
            receiver: "slack-warning"
          - match:
              alertname: "RobotOffline"
            receiver: "pagerduty-warehouse"
      receivers:
        - name: "slack-critical"
          slack_configs:
            - api_url_secret:
                name: alertmanager-secrets
                key: slack-webhook-url
              channel: "#alerts-critical"
              title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
              text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
        - name: "slack-warning"
          slack_configs:
            - api_url_secret:
                name: alertmanager-secrets
                key: slack-webhook-url
              channel: "#alerts-warning"
        - name: "pagerduty-warehouse"
          pagerduty_configs:
            - service_key_secret:
                name: alertmanager-secrets
                key: pagerduty-key

  # ── Grafana ───────────────────────────────────
  grafana:
    enabled: true
    adminPassword: ""   # injected via ExternalSecret
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      hosts:
        - grafana.kiruz.com
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.kiruz.com
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 10Gi
    # Keycloak SSO
    grafana.ini:
      auth.generic_oauth:
        enabled: true
        name: "Keycloak"
        allow_sign_up: true
        client_id: grafana
        scopes: "openid email profile offline_access roles"
        auth_url: "https://auth.kiruz.com/realms/kiruz/protocol/openid-connect/auth"
        token_url: "https://auth.kiruz.com/realms/kiruz/protocol/openid-connect/token"
        api_url: "https://auth.kiruz.com/realms/kiruz/protocol/openid-connect/userinfo"
        role_attribute_path: "contains(roles[*], 'admin') && 'Admin' || contains(roles[*], 'editor') && 'Editor' || 'Viewer'"

    # Pre-loaded dashboards
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: "kiruz"
            orgId: 1
            folder: "Kiruz Platform"
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/kiruz

    dashboardsConfigMaps:
      kiruz: "grafana-dashboards"

    # Loki + Tempo datasources
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false
      - name: Tempo
        type: tempo
        url: http://tempo.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false

  # ── Node exporters / kube-state-metrics ───────
  nodeExporter:
    enabled: true
  kubeStateMetrics:
    enabled: true
  kubelet:
    enabled: true
  kubeApiServer:
    enabled: true
  coreDns:
    enabled: true
