# Wraps the Bitnami Keycloak chart with Kiruz-specific overrides
keycloak:
  replicaCount: 2

  auth:
    adminUser: admin
    # adminPassword injected via ExternalSecret
    existingSecret: keycloak-admin-secret
    passwordSecretKey: admin-password

  production: true
  proxy: edge   # behind HAProxy / Nginx

  ingress:
    enabled: true
    ingressClassName: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/proxy-buffer-size: "256k"
    hostname: auth.kiruz.com
    tls: true
    extraTls:
      - hosts:
          - auth.kiruz.com
        secretName: keycloak-tls

  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

  # External PostgreSQL (Patroni)
  postgresql:
    enabled: false
  externalDatabase:
    host: postgresql-primary.storage.svc.cluster.local
    port: 5432
    database: keycloak
    user: keycloak
    existingSecret: keycloak-db-secret
    existingSecretPasswordKey: password

  # Realm config as code (import on startup)
  extraVolumeMounts:
    - name: realm-config
      mountPath: /opt/bitnami/keycloak/data/import

  extraVolumes:
    - name: realm-config
      configMap:
        name: keycloak-realm-config

  # Push MFA via FreeOTP / Google Authenticator
  extraEnvVars:
    - name: KC_FEATURES
      value: "token-exchange,admin-fine-grained-authz,declarative-user-profile"
    - name: KC_SPI_THEME_DEFAULT
      value: "kiruz-theme"

  # Pod disruption budget
  pdb:
    create: true
    minAvailable: 1

  podAntiAffinityPreset: "soft"

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

# External secrets for Keycloak admin + DB credentials
externalSecrets:
  enabled: true
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  adminSecret:
    key: secret/keycloak
    property: admin_password
  dbSecret:
    key: secret/keycloak
    property: db_password
