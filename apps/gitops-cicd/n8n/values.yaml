replicaCount: 1

image:
  repository: n8nio/n8n
  tag: "1.45"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5678

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/auth-url: "https://auth.kiruz.com/realms/kiruz/protocol/openid-connect/auth"
  hosts:
    - host: n8n.kiruz.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: n8n-tls
      hosts:
        - n8n.kiruz.com

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

env:
  N8N_BASIC_AUTH_ACTIVE: "false"      # using Keycloak OIDC
  N8N_HOST: "n8n.kiruz.com"
  N8N_PORT: "5678"
  N8N_PROTOCOL: "https"
  WEBHOOK_URL: "https://n8n.kiruz.com/"
  DB_TYPE: "postgresdb"
  DB_POSTGRESDB_HOST: "postgresql-primary.storage.svc.cluster.local"
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_DATABASE: "n8n"
  DB_POSTGRESDB_USER: "n8n"
  # DB_POSTGRESDB_PASSWORD injected via ExternalSecret
  EXECUTIONS_PROCESS: "main"
  QUEUE_BULL_REDIS_HOST: "redis-master.storage.svc.cluster.local"

# Workflows for content pipeline triggered by Saleor events
contentPipeline:
  enabled: true
  ollamaUrl: "http://ollama.gitops-cicd.svc.cluster.local:11434"
  strapiUrl: "http://strapi.gitops-cicd.svc.cluster.local:1337"
  saleorWebhookSecret: ""   # injected via ExternalSecret

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 5Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
