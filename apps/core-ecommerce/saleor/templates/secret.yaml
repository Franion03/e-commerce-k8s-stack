# Secret values are injected by External Secrets Operator from Vault.
# This manifest creates a placeholder Secret; ESO will keep it reconciled.
{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "saleor.fullname" . }}-secret
  namespace: core-ecommerce
  labels:
    {{- include "saleor.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "saleor.fullname" . }}-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    {{- range .Values.externalSecrets.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        property: {{ .remoteRef.property }}
    {{- end }}
{{- else }}
# Fallback: plain Secret (NOT for production — rotate with Sealed Secrets or ESO)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "saleor.fullname" . }}-secret
  namespace: core-ecommerce
  labels:
    {{- include "saleor.labels" . | nindent 4 }}
  annotations:
    # Replace with SealedSecret before committing
    "helm.sh/resource-policy": keep
type: Opaque
data:
  DATABASE_URL: ""         # base64-encoded; fill via CI or Sealed Secret
  SECRET_KEY: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  STRIPE_SECRET_KEY: ""
{{- end }}
