---
# ──────────────────────────────────────────────────────────────────
# ArgoCD Application — PostgreSQL (CloudNativePG)
# ──────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  labels:
    env: production
    layer: storage
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ecommerce
  source:
    repoURL: https://gitlab.kiruz.com/kiruz/e-commerceStack.git
    targetRevision: main
    path: apps/storage/postgresql
  destination:
    server: https://kubernetes.default.svc
    namespace: storage
  syncPolicy:
    automated:
      prune: false    # NEVER auto-prune database resources
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  # required for CNPG CRDs

---
# ──────────────────────────────────────────────────────────────────
# ArgoCD Application — Prometheus Stack
# ──────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  labels:
    env: production
    layer: monitoring
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ecommerce
  source:
    repoURL: https://gitlab.kiruz.com/kiruz/e-commerceStack.git
    targetRevision: main
    path: apps/monitoring/prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle

