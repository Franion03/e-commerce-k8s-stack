---
# ──────────────────────────────────────────────────────────────────
# ArgoCD AppProject for production environment
# ──────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ecommerce
  namespace: argocd
spec:
  description: "Kiruz eCommerce platform — all production services"
  sourceRepos:
    - "https://gitlab.kiruz.com/kiruz/e-commerceStack.git"
    - "https://charts.bitnami.com/bitnami"
    - "https://argoproj.github.io/argo-helm"
    - "https://charts.gitlab.io"
    - "https://prometheus-community.github.io/helm-charts"
    - "https://grafana.github.io/helm-charts"
    - "https://cloudnative-pg.github.io/charts"
    - "https://haproxytech.github.io/helm-charts"
    - "https://helm.influxdata.com"
    - "https://charts.jetstack.io"
  destinations:
    - namespace: "core-ecommerce"
      server: "https://kubernetes.default.svc"
    - namespace: "identity-security"
      server: "https://kubernetes.default.svc"
    - namespace: "infrastructure"
      server: "https://kubernetes.default.svc"
    - namespace: "gitops-cicd"
      server: "https://kubernetes.default.svc"
    - namespace: "monitoring"
      server: "https://kubernetes.default.svc"
    - namespace: "storage"
      server: "https://kubernetes.default.svc"
    - namespace: "warehouse-robots"
      server: "https://kubernetes.default.svc"
    - namespace: "marketing"
      server: "https://kubernetes.default.svc"
    - namespace: "argocd"
      server: "https://kubernetes.default.svc"
    - namespace: "cert-manager"
      server: "https://kubernetes.default.svc"
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition
    - group: "external-secrets.io"
      kind: ClusterSecretStore
    - group: "argoproj.io"
      kind: AppProject
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  roles:
    - name: platform-admin
      description: "Full access to all applications"
      policies:
        - p, proj:ecommerce:platform-admin, applications, *, ecommerce/*, allow
      groups:
        - "kiruz:platform-team"
    - name: developer
      description: "Read-only access + sync for non-prod"
      policies:
        - p, proj:ecommerce:developer, applications, get, ecommerce/*, allow
        - p, proj:ecommerce:developer, applications, sync, ecommerce/staging-*, allow
      groups:
        - "kiruz:developers"

---
# ──────────────────────────────────────────────────────────────────
# ArgoCD Application — Saleor
# ──────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: saleor
  namespace: argocd
  labels:
    env: production
    layer: core-ecommerce
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ecommerce
  source:
    repoURL: https://gitlab.kiruz.com/kiruz/e-commerceStack.git
    targetRevision: main
    path: apps/core-ecommerce/saleor
    helm:
      valueFiles:
        - values.yaml
        - ../../clusters/production/overrides/saleor.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: core-ecommerce
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas   # managed by HPA
    - group: ""
      kind: Secret
      jsonPointers:
        - /data             # managed by External Secrets Operator
  revisionHistoryLimit: 10

