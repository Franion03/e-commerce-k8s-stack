---
# ──────────────────────────────────────────────────────────────────
# ArgoCD Application — cert-manager
# Deploys cert-manager + ClusterIssuers (letsencrypt-prod and
# letsencrypt-staging) via the official Jetstack Helm chart.
# Must sync before any app that requires TLS certificates.
# ──────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  labels:
    env: production
    layer: identity-security
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ecommerce
  source:
    repoURL: https://gitlab.kiruz.com/kiruz/e-commerceStack.git
    targetRevision: main
    path: apps/identity-security/cert-manager
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # required for cert-manager CRDs (size limit)
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  # Ignore CA bundle fields managed by cert-manager itself
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
    - group: ""
      kind: Secret
      jsonPointers:
        - /data   # account keys and cert data managed by cert-manager
  revisionHistoryLimit: 10
